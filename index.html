<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Pokedex</title>
    <link href="style.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" rel="icon" >
</head>
<body>
    <div class="background"></div>

    <div class="card" id="card">
    <h1 class="title">
        Pokédex<div class="pokeball-css"></div>
    </h1>

    <div id="przycisk">
    <div class="input-wrapper">
    <input type="text" id="pokemonInput" placeholder="Wpisz nazwę Pokemona">
    <div id="suggestions"></div>
    </div>
    <button id="searchBtn">Szukaj</button>
    </div>

    <img src="https://via.placeholder.com/150" alt="Pokemon">
    <h2>NazwaPokemona</h2>
    <p id="typ" class="badge">TypPokemona</p>
    <div id="result"></div>

    <a id="cardmarketlink" target="_blank">
        <button>Zobacz karty na Cardmarket</button>
    </a>
    
    </div>

    <script src="script.js"></script>

    
</body>
</html>
